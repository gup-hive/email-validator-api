version: '3.8'

services:
  email-validator:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key}
      - SMTP_TIMEOUT=10
      - MX_TIMEOUT=5
      - RATE_LIMIT=100
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs:/app/logs
    networks:
      - email-validator-network

networks:
  email-validator-network:
    driver: bridge
